services:
  redis:
    image: redis:7.2.6-alpine
    container_name: redis
    restart: always
    env_file:
      - ./.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app


volumes:
  redis_data:
    name: redis_data

networks:
  app:
    external: true